name: Generate JSON Schema

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  generate-schema:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Build schema generator
        run: |
          docker build --target builder -t kbapi-schema .

      - name: Extract schema files
        run: |
          docker create --name extract kbapi-schema
          docker cp extract:/build/query.schema.json .
          docker cp extract:/build/query_result.schema.json .
          docker rm extract

      - name: Commit schema files to PR
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin ${{ github.head_ref }}
          git checkout ${{ github.head_ref }}
          git add query.schema.json query_result.schema.json VERSION
          git commit -m "⬆️ Bump version: ${{ steps.version.outputs.version }}"
          git push origin ${{ github.head_ref }}

      - name: Create tag and release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v${{ steps.version.outputs.version }}"
          git tag "$VERSION"
          git push origin "$VERSION"
          gh release create "$VERSION" \
            --title "$VERSION" \
            query.schema.json \
            query_result.schema.json
