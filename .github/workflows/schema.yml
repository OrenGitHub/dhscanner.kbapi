name: Generate JSON Schema

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate-schema:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Read and bump patch version
        id: version
        run: |
          current=$(cat VERSION)
          major=$(echo $current | cut -d. -f1)
          minor=$(echo $current | cut -d. -f2)
          patch=$(echo $current | cut -d. -f3)
          new_patch=$((patch + 1))
          new_version="$major.$minor.$new_patch"
          echo "$new_version" > VERSION
          echo "new_version=$new_version" >> $GITHUB_OUTPUT

      - name: Build schema generator
        run: |
          docker build --target builder -t kbapi-schema .

      - name: Extract schema files
        run: |
          docker create --name extract kbapi-schema
          docker cp extract:/build/query.schema.json .
          docker cp extract:/build/query_result.schema.json .
          docker rm extract

      - name: Commit schema files and version bump (only if changed)
        if: github.actor != 'github-actions[bot]'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add query.schema.json query_result.schema.json VERSION

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m ":arrow_up: Bump version: ${{ steps.version.outputs.new_version }}"
          git push

      - name: Create tag and release
        if: github.actor != 'github-actions[bot]'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v${{ steps.version.outputs.new_version }}"
          git tag "$VERSION"
          git push origin "$VERSION"

          gh release create "$VERSION" \
            --title "$VERSION" \
            query.schema.json \
            query_result.schema.json
